<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Landing Page</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        gold: '#D4AF37',
        'gold-light': '#F0D060',
        'gold-dark': '#B8960C',
        'black-rich': '#0A0A0A',
        'black-soft': '#1A1A1A',
        'black-card': '#141414',
        'gray-luxury': '#2A2A2A',
      },
      fontFamily: {
        serif: ['Noto Serif JP', 'serif'],
        sans: ['Noto Sans JP', 'sans-serif'],
      },
      animation: {
        pulse_cta: 'pulse_cta 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
        fadeInUp: 'fadeInUp 0.8s ease-out forwards',
        shimmer: 'shimmer 3s ease-in-out infinite',
        float: 'float 3s ease-in-out infinite',
      },
      keyframes: {
        pulse_cta: {
          '0%, 100%': { boxShadow: '0 0 0 0 rgba(212, 175, 55, 0.7)' },
          '50%': { boxShadow: '0 0 0 20px rgba(212, 175, 55, 0)' },
        },
        fadeInUp: {
          '0%': { opacity: '0', transform: 'translateY(30px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' },
        },
        shimmer: {
          '0%': { backgroundPosition: '-200% center' },
          '100%': { backgroundPosition: '200% center' },
        },
        float: {
          '0%, 100%': { transform: 'translateY(0)' },
          '50%': { transform: 'translateY(-10px)' },
        },
      },
    },
  },
}
</script>
<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans JP', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }
  .gold-gradient { background: linear-gradient(135deg, #B8960C, #D4AF37, #F0D060, #D4AF37, #B8960C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .gold-bg-gradient { background: linear-gradient(135deg, #B8960C, #D4AF37, #F0D060, #D4AF37); }
  .gold-border { border-image: linear-gradient(135deg, #B8960C, #D4AF37, #F0D060) 1; }
  .shimmer-text { background: linear-gradient(90deg, #D4AF37, #F0D060, #FFFFFF, #F0D060, #D4AF37); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 3s ease-in-out infinite; }
  .card-hover { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15); }
  .divider-gold { height: 1px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); }
  .bg-pattern { background-image: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%); }
  .hero-overlay { background: linear-gradient(180deg, rgba(10,10,10,0.7) 0%, rgba(10,10,10,0.85) 50%, rgba(10,10,10,1) 100%); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0A0A0A; }
  ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
</style>
</head>
<body class="overflow-x-hidden">

<!-- Navigation -->

  </div>
</section>
