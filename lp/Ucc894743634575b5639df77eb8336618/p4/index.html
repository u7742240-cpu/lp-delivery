<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        gold: {
          50: '#fff9e6',
          100: '#fff0b3',
          200: '#ffe680',
          300: '#ffdb4d',
          400: '#ffd11a',
          500: '#d4a843',
          600: '#b8860b',
          700: '#9a7209',
          800: '#7c5b07',
          900: '#5e4405',
        },
        dark: {
          50: '#2a2a2a',
          100: '#1f1f1f',
          200: '#1a1a1a',
          300: '#151515',
          400: '#111111',
          500: '#0d0d0d',
          600: '#0a0a0a',
          700: '#070707',
          800: '#050505',
          900: '#000000',
        }
      },
      fontFamily: {
        serif: ['Noto Serif JP', 'serif'],
        sans: ['Noto Sans JP', 'sans-serif'],
      },
      animation: {
        'pulse-cta': 'pulseCta 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
        'shimmer': 'shimmer 3s linear infinite',
        'float': 'float 6s ease-in-out infinite',
        'fadeInUp': 'fadeInUp 1s ease-out forwards',
        'fadeInLeft': 'fadeInLeft 1s ease-out forwards',
        'fadeInRight': 'fadeInRight 1s ease-out forwards',
        'glow': 'glow 2s ease-in-out infinite alternate',
      },
      keyframes: {
        pulseCta: {
          '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(212, 168, 67, 0.7)' },
          '50%': { transform: 'scale(1.05)', boxShadow: '0 0 30px 10px rgba(212, 168, 67, 0.3)' },
        },
        shimmer: {
          '0%': { backgroundPosition: '-200% 0' },
          '100%': { backgroundPosition: '200% 0' },
        },
        float: {
          '0%, 100%': { transform: 'translateY(0)' },
          '50%': { transform: 'translateY(-10px)' },
        },
        fadeInUp: {
          '0%': { opacity: '0', transform: 'translateY(40px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' },
        },
        fadeInLeft: {
          '0%': { opacity: '0', transform: 'translateX(-40px)' },
          '100%': { opacity: '1', transform: 'translateX(0)' },
        },
        fadeInRight: {
          '0%': { opacity: '0', transform: 'translateX(40px)' },
          '100%': { opacity: '1', transform: 'translateX(0)' },
        },
        glow: {
          '0%': { boxShadow: '0 0 5px rgba(212, 168, 67, 0.3), 0 0 10px rgba(212, 168, 67, 0.1)' },
          '100%': { boxShadow: '0 0 20px rgba(212, 168, 67, 0.6), 0 0 40px rgba(212, 168, 67, 0.2)' },
        },
      }
    }
  }
}
</script>
<style>

.scrolled .nav-bg { background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); }
.hero-overlay { background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0.8) 100%); }
::-webkit-scrollbar { width: 8px; }

::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b8860b, #d4a843); border-radius: 4px; }
.animate-on-scroll { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
.animate-on-scroll.visible { opacity: 1; transform: translateY(0); }
</style>
